<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inhalo Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Inhalo Admin</h2>
    <nav>
      <a href="#" class="active">Dashboard</a>
      <a href="#">Users</a>
      <a href="#">Sessions</a>
      <a href="#">Content</a>
      <a href="#">Feedback</a>
      <a href="#">Settings</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header>
      <h1>Dashboard</h1>
      <button class="logout-btn">Logout</button>
    </header>

    <!-- Stats Section -->
    <section class="stats">
      <div class="card">
        <h3>Total Users</h3>
        <p>250</p>
      </div>
      <div class="card">
        <h3>Active Sessions</h3>
        <p>45</p>
      </div>
      <div class="card">
        <h3>Feedback</h3>
        <p>98% Positive</p>
      </div>
    </section>

    <!-- Recent Activity -->
    <section class="details">
      <h2>Recent Activity</h2>
      <ul>
        <li>User A completed "Calm Breathing"</li>
        <li>User B started "Sleep Meditation"</li>
        <li>User C joined Inhalo</li>
      </ul>
    </section>
  </main>
</body>
</html>
