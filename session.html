<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Your Session - Inhalo</title>
  <link rel="stylesheet" href="session.css">
</head>
<body>
  <div class="session-container">
    <h1>Take a Personalized Session</h1>
    <form id="sessionForm">
      <!-- Mood Selection -->
      <section class="step">
        <h2>Select Your Mood</h2>
        <div class="options-grid">
          <label class="option-card">
            <input type="radio" name="mood" value="Happy">
            <span>Happy 🙂</span>
          </label>
          <label class="option-card">
            <input type="radio" name="mood" value="Sad">
            <span>Sad 😔</span>
          </label>
          <label class="option-card">
            <input type="radio" name="mood" value="Angry">
            <span>Angry 😡</span>
          </label>
          <label class="option-card">
            <input type="radio" name="mood" value="Calm">
            <span>Calm 😌</span>
          </label>
          <label class="option-card">
            <input type="radio" name="mood" value="Lonely">
            <span>Lonely 🫂</span>
          </label>
          <label class="option-card">
            <input type="radio" name="mood" value="Confident">
            <span>Confident 😎</span>
          </label>
          <label class="option-card">
            <input type="radio" name="mood" value="Anxious">
            <span>Anxious 😕</span>
          </label>
        </div>
      </section>

      <!-- Support Type -->
      <section class="step">
        <h2>Select Support Type</h2>
        <div class="options-grid">
          <label class="option-card">
            <input type="radio" name="type" value="Affirmations">
            <span>Affirmations ✨</span>
          </label>
          <label class="option-card">
            <input type="radio" name="type" value="Guided Meditation">
            <span>Guided Meditation 🧘</span>
          </label>
          <label class="option-card">
            <input type="radio" name="type" value="Journal Prompt">
            <span>Journal Prompt ✍️</span>
          </label>
        </div>
      </section>

      <!-- Proceed Button -->
      <button type="submit" class="btn">Generate My Session</button>
    </form>
  </div>
  <script src="session.js"></script>
</body>
</html>
